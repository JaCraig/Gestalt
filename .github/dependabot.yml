# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # --- Foundational Layer ---
  # Gestalt.Core is the base for all other projects
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Core/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"

  # --- Core Application Layers ---
  # Gestalt.Console depends on Gestalt.Core
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Console/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"

  # Gestalt.ASPNet depends on Gestalt.Core
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"

  # --- ASPNet Extensions (depend on ASPNet & Core) ---
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.Controllers/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.MVC/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.RazorPages/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.SignalR/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      dependencies:
        patterns:
          - "*"

  # --- Example & Utility Projects (depend on above) ---
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Example/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Example.Console/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Example.SelfContainedModule/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.SpeedTests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"

  # --- Test & Helper Projects (depend on main projects) ---
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Tests.Helpers/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Core.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.Console.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.Controllers.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.MVC.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.RazorPages.Tests/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "nuget"
    directory: "/Gestalt.ASPNet.SignalR.Tests/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    groups:
      dependencies:
        patterns:
          - "*"