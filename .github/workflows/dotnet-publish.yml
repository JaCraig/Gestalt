# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Publish

on:
  push:
    branches: ["main"]

jobs:
  build:
    env:
      BUILD_CONFIG: "Release"
      SOLUTION: "Gestalt.CI.sln"
      HUSKY: 0

    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["10.0.x"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install Versionize
        run: dotnet tool install --global Versionize

      - name: Setup git
        run: |
          git config --local user.email "JaCraig@users.noreply.github.com"
          git config --local user.name "James Craig"

      - name: Versionize Release
        id: versionize
        run: versionize --exit-insignificant-commits
        continue-on-error: true

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION }}" --no-restore --configuration $BUILD_CONFIG

      - name: Test
        run: |
          for project in \
            Gestalt.Core.Tests/Gestalt.Core.Tests.csproj \
            Gestalt.Console.Tests/Gestalt.Console.Tests.csproj \
            Gestalt.ASPNet.Tests/Gestalt.ASPNet.Tests.csproj \
            Gestalt.ASPNet.Controllers.Tests/Gestalt.ASPNet.Controllers.Tests.csproj \
            Gestalt.ASPNet.MVC.Tests/Gestalt.ASPNet.MVC.Tests.csproj \
            Gestalt.ASPNet.RazorPages.Tests/Gestalt.ASPNet.RazorPages.Tests.csproj \
            Gestalt.ASPNet.SignalR.Tests/Gestalt.ASPNet.SignalR.Tests.csproj
          do
            dotnet test "$project" --framework net10.0 /p:CollectCoverage=true /p:CoverletOutput=TestResults-${{ matrix.dotnet-version }}/ /p:CoverletOutputFormat=lcov /p:Configuration=$BUILD_CONFIG --no-build --verbosity normal --logger trx --results-directory "TestResults-${{ matrix.dotnet-version }}"
          done

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-results-${{ matrix.dotnet-version }}
          path: TestResults-${{ matrix.dotnet-version }}
        if: ${{ always() }}

      - name: Publish coverage report to coveralls.io
        uses: coverallsapp/github-action@v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: ./Gestalt.Core.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.Console.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.ASPNet.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.ASPNet.Controllers.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.ASPNet.MVC.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.ASPNet.RazorPages.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info ./Gestalt.ASPNet.SignalR.Tests/TestResults-${{ matrix.dotnet-version }}/coverage.net10.0.info
          format: lcov
        continue-on-error: true

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: NugetPackage
          path: ./**/*.nupkg
        if: steps.versionize.outcome == 'success'

      - name: Upload Symbol package
        uses: actions/upload-artifact@v7
        with:
          name: SymbolPackage
          path: ./**/*.snupkg
        if: steps.versionize.outcome == 'success'

      - name: Push changes to Github
        if: steps.versionize.outcome == 'success'
        uses: ad-m/github-push-action@v1.0.0
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          branch: ${{ github.ref }}
          force: true
          tags: true

      - name: Upload package to NuGet
        if: steps.versionize.outcome == 'success'
        run: dotnet nuget push "**/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
